!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname GWSiteA
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
crypto isakmp policy 1
 encr aes
 authentication pre-share
 group 2
crypto isakmp key Secret_Key_123 address 10.0.23.1
!
!
crypto ipsec transform-set Tar_Set esp-aes esp-sha-hmac 
!
crypto map Tar_Map_VPN 1 ipsec-isakmp 
 set peer 10.0.23.1
 set transform-set Tar_Set 
 match address 100
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface FastEthernet0/0
 ip address 10.0.11.1 255.255.255.0
 duplex auto
 speed auto
!
interface FastEthernet0/1
 ip address 10.0.12.1 255.255.255.0
 duplex auto
 speed auto
 crypto map Tar_Map_VPN
!
ip forward-protocol nd
ip route 0.0.0.0 0.0.0.0 10.0.12.2
!
!
no ip http server
no ip http secure-server
!
access-list 100 permit ip 10.0.11.0 0.0.0.255 10.0.22.0 0.0.0.255
no cdp log mismatch duplex
!
!
!
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
line vty 0 4
 login
!
!
end
